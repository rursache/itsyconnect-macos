services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - app_data:/data
    environment:
      AUTH_USERNAME: admin
      AUTH_PASSWORD_HASH: "${AUTH_PASSWORD_HASH}"
      SESSION_SECRET: "${SESSION_SECRET}"
      ENCRYPTION_MASTER_KEY: "${ENCRYPTION_MASTER_KEY}"
      # Optional: set for AI features
      # ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    restart: unless-stopped

volumes:
  app_data:
